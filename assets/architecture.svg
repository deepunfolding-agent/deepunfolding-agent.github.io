<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="DeepUnfolding Agent architecture diagram">
  <defs>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1D4ED8" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="620" rx="30" fill="#F8FBFF"/>
  <rect x="42" y="42" width="1116" height="536" rx="30" fill="#FFFFFF" stroke="#DBE7FB" stroke-width="2"/>

  <text x="600" y="88" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#0F172A">DeepUnfolding Agent API Control Loop</text>
  <text x="600" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#5B6474">Schema-driven adaptive control for classical, quantum, and hybrid optimisation systems</text>

  <g filter="url(#shadow)">
    <rect x="80" y="210" width="220" height="106" rx="22" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="190" y="252" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#1E3A8A">External Training</text>
    <text x="190" y="278" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#1E3A8A">System</text>
    <text x="190" y="302" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">FL, QFL, hybrid workflow</text>

    <rect x="382" y="178" width="226" height="80" rx="20" fill="url(#blue)"/>
    <text x="495" y="211" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">FastAPI Service</text>
    <text x="495" y="236" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#DBEAFE">Swagger + REST endpoints</text>

    <rect x="382" y="294" width="226" height="80" rx="20" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="495" y="328" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#1E3A8A">Strategy Registry</text>
    <text x="495" y="353" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">schema + bounds</text>

    <rect x="690" y="178" width="226" height="80" rx="20" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="803" y="211" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#1E3A8A">Schema Adapter</text>
    <text x="803" y="236" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">diagnostics → state vector</text>

    <rect x="690" y="294" width="226" height="80" rx="20" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="803" y="328" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#1E3A8A">Controller Factory</text>
    <text x="803" y="353" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">classical, quantum, hybrid</text>

    <rect x="962" y="226" width="178" height="118" rx="24" fill="url(#blue)"/>
    <text x="1051" y="269" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">Deep-Unfolded</text>
    <text x="1051" y="294" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">Controller</text>
    <text x="1051" y="319" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#DBEAFE">bounded controls</text>
  </g>

  <path d="M300 263 C333 263 342 218 374 218" fill="none" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="337" y="238" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#2563EB">diagnostics</text>

  <path d="M608 218 L682 218" fill="none" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M608 334 L682 334" fill="none" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M803 258 L803 286" fill="none" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M916 285 L954 285" fill="none" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M962 344 C912 474 378 482 225 324" fill="none" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)" stroke-dasharray="10 9"/>
  <text x="640" y="504" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" fill="#2563EB">returned controls + feedback update</text>

  <g>
    <rect x="246" y="418" width="706" height="78" rx="22" fill="#F1F5FF" stroke="#C7DBFF" stroke-width="2"/>
    <text x="599" y="448" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#1E3A8A">Persistent Experiment Layer</text>
    <text x="599" y="474" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748B">SQLite storage · experiment logger · metrics.csv · control_history.csv · summary.json</text>
  </g>
</svg>
